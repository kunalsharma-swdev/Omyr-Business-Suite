kind = "web"
previewPath = "/"
title = "Omyra Fancy Dress & School Uniforms"
version = "1.0.0"
id = "artifacts/omyra-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19835

[services.development]
run = "pnpm --filter @workspace/omyra-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omyra-website", "run", "build" ]
publicDir = "artifacts/omyra-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19835"
BASE_PATH = "/"
